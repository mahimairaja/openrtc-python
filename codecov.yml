# Codecov repository settings (validate: curl --data-binary @codecov.yml https://codecov.io/validate)
# CI still enforces coverage via pytest --cov-fail-under=80; this configures
# Codecov checks and PR comments. Patch status is informational so small PRs
# are not blocked twice (pytest remains the hard gate for overall %).

# Optional Textual sidecar (`openrtc[tui]`). Excluded from Codecov totals/patch so
# PR checks are not dominated by UI-only lines; `pytest --cov=openrtc` still
# includes it unless you omit it locally.
ignore:
  - "**/openrtc/tui_app\\.py"

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 1%
    patch:
      default:
        target: 80%
        informational: true

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
